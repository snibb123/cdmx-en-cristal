<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>CDMX · Ciudad de Cristal — Aug 8–16</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@125,500;125,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root{
    --bg:#0a0f1e; --ink:#e9edf6; --mut:#93a0b8; --faint:#5f6a85;
    --panel:rgba(12,19,36,.86); --line:rgba(150,200,255,.16);
    --disp:"Archivo",-apple-system,sans-serif;
    --body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body,#map{height:100%;overflow:hidden;background:var(--bg)}
  body{color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
  #map{position:fixed;inset:0}
  /* ---- title plate ---- */
  #plate{position:fixed;left:22px;top:20px;z-index:5;pointer-events:none;
    padding:14px 18px 15px;border-radius:14px;background:var(--panel);
    border:1px solid var(--line);backdrop-filter:blur(14px)}
  #plate .eyebrow{font:500 10px/1 var(--mono);letter-spacing:.24em;color:var(--mut)}
  #plate h1{font:600 30px/1 var(--disp);letter-spacing:.06em;margin:7px 0 5px}
  #plate h1 b{font-weight:500;color:transparent;-webkit-text-stroke:1px rgba(160,215,255,.8)}
  #plate .sub{font:400 11.5px/1.5 var(--body);color:var(--mut);max-width:250px}
  /* ---- chips ---- */
  #rail{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:6;
    display:flex;gap:5px;padding:7px 8px;border-radius:14px;background:var(--panel);
    border:1px solid var(--line);backdrop-filter:blur(14px);
    max-width:calc(100vw - 24px);overflow-x:auto;scrollbar-width:none}
  #rail::-webkit-scrollbar{display:none}
  .chip{flex:none;display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:9px;
    border:1px solid transparent;background:transparent;color:var(--mut);cursor:pointer;
    font:500 11px/1.2 var(--body);transition:.15s;white-space:nowrap}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--c,#8fc5ff);box-shadow:0 0 6px var(--c,#8fc5ff)}
  .chip small{display:block;font:500 8.5px/1 var(--mono);letter-spacing:.1em;color:var(--faint);margin-top:3px;text-transform:uppercase}
  .chip:hover{color:var(--ink);background:rgba(150,200,255,.08)}
  .chip.on{color:var(--ink);border-color:var(--c,rgba(150,200,255,.45));background:rgba(150,200,255,.09)}
  .chip:focus-visible{outline:1.5px solid #55d6f0;outline-offset:2px}
  /* ---- card ---- */
  #card{position:fixed;right:20px;top:20px;z-index:5;width:312px;pointer-events:none;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    backdrop-filter:blur(16px);overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.06);
    transition:opacity .22s}
  #card .ph{position:relative;height:150px;background:linear-gradient(160deg,#16223f,#0b1122)}
  #card .ph img{width:100%;height:100%;object-fit:cover;display:block;
    mask-image:linear-gradient(to bottom,#000 62%,rgba(0,0,0,.25));
    -webkit-mask-image:linear-gradient(to bottom,#000 62%,rgba(0,0,0,.25))}
  #card .ph .credit{position:absolute;right:8px;bottom:5px;font:400 8.5px/1 var(--mono);
    color:rgba(233,237,246,.55);text-shadow:0 1px 2px rgba(0,0,0,.8)}
  #card .bd{padding:12px 15px 14px}
  #card .kick{display:flex;align-items:center;gap:8px;font:600 9.5px/1 var(--mono);
    letter-spacing:.2em;text-transform:uppercase;color:var(--mut)}
  #card .kick i{width:9px;height:9px;border-radius:50%;background:var(--c,#8fc5ff);box-shadow:0 0 8px var(--c,#8fc5ff)}
  #card h3{font:600 19px/1.15 var(--disp);letter-spacing:.02em;margin:7px 0 5px;text-wrap:balance}
  #card .blurb{font:400 11.5px/1.55 var(--body);color:var(--mut);margin-bottom:8px}
  #card ul{list-style:none;max-height:214px;overflow:hidden}
  #card li{display:flex;gap:9px;padding:2.5px 0;font:400 11.5px/1.45 var(--body)}
  #card li .tm{flex:none;width:46px;font:500 9.5px/1.7 var(--mono);color:var(--faint);
    font-variant-numeric:tabular-nums;text-align:right}
  #card li.sel{color:#fff}
  #card li.sel .tm{color:var(--c,#8fc5ff)}
  #card li .nm b{font-weight:600}
  #card li .why{display:block;font-size:10.5px;color:var(--mut)}
  #card .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
  #card .tag{font:500 9px/1 var(--mono);letter-spacing:.04em;padding:4px 7px;border-radius:99px;
    border:1px solid rgba(120,225,170,.35);color:#8ce8b8}
  #card .tag.todo{border-color:rgba(245,190,90,.4);color:#f2ca7e}
  /* ---- markers ---- */
  .pin{width:26px;height:26px;cursor:pointer;position:relative}
  .pin i{position:absolute;inset:6px;border-radius:50%;background:var(--c);
    border:2px solid rgba(255,255,255,.92);
    box-shadow:0 0 12px var(--c),0 2px 6px rgba(0,0,0,.5)}
  .pin b{position:absolute;inset:0;border-radius:50%;border:2px solid var(--c);opacity:.8}
  .pin.home{width:34px;height:34px}
  .pin.home i{inset:8px;background:#fff;box-shadow:0 0 14px #cfe4ff,0 2px 6px rgba(0,0,0,.5)}
  .pin.home b{border-color:#fff}
  .pin.dim{opacity:.18}
  .pin.hot b{animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.6)}}
  /* ---- 2D/3D + theme toggles ---- */
  #ctrls{position:fixed;left:22px;top:162px;z-index:6;display:flex;gap:8px}
  #modes,#themes{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;
    background:var(--panel);backdrop-filter:blur(14px)}
  #ctrls button{font:600 11px/1 var(--mono);letter-spacing:.08em;color:var(--mut);
    background:transparent;border:0;padding:9px 15px;cursor:pointer;transition:.15s}
  #ctrls button:hover{color:var(--ink)}
  #ctrls button.on{color:#0a0f1e;background:#8fc5ff}
  #ctrls button:focus-visible{outline:1.5px solid #55d6f0;outline-offset:-2px}
  /* ---- light theme ---- */
  body.light{
    --bg:#e8ecf2; --ink:#182238; --mut:#4d5b74; --faint:#8b97ac;
    --panel:rgba(250,252,255,.9); --line:rgba(30,60,110,.15);
  }
  body.light #plate h1 b{-webkit-text-stroke-color:rgba(45,95,175,.75)}
  body.light #card{box-shadow:0 24px 60px rgba(30,50,90,.22), inset 0 1px 0 rgba(255,255,255,.7)}
  body.light #card .tag{color:#1e7a4d;border-color:rgba(30,122,77,.45)}
  body.light #card .tag.todo{color:#9a6b1a;border-color:rgba(154,107,26,.45)}
  body.light .pin.home i{background:#16233f;box-shadow:0 0 12px rgba(22,35,63,.45),0 2px 6px rgba(0,0,0,.25)}
  body.light .pin.home b{border-color:#16233f}
  body.light .maplibregl-ctrl-attrib{background:rgba(255,255,255,.65)!important;color:#4d5b74!important}
  body.light .maplibregl-ctrl-attrib a{color:#2d4a74!important}
  body.light .maplibregl-ctrl-group button .maplibregl-ctrl-icon{filter:none}
  /* ---- misc chrome ---- */
  .maplibregl-ctrl-bottom-left{bottom:14px}
  .maplibregl-ctrl-attrib{background:rgba(10,15,30,.6)!important;color:#93a0b8!important;font-size:10px}
  .maplibregl-ctrl-attrib a{color:#b9c6dd!important}
  .maplibregl-ctrl-group{background:var(--panel)!important;border:1px solid var(--line);border-radius:10px!important;overflow:hidden}
  .maplibregl-ctrl-group button{background:transparent!important}
  .maplibregl-ctrl-group button .maplibregl-ctrl-icon{filter:invert(.85) hue-rotate(180deg)}
  @media (max-width:840px){
    #plate{left:12px;top:12px;padding:10px 13px}
    #plate h1{font-size:22px}
    #plate .sub{display:none}
    #ctrls{left:12px;top:84px}
    #ctrls button{padding:8px 11px}
    #card{left:12px;right:12px;width:auto;top:auto;bottom:72px}
    #card .ph{height:92px}
    #card ul{max-height:118px}
    #card .blurb{display:none}
    #rail{bottom:10px}
  }
  @media (prefers-reduced-motion:reduce){.pin.hot b{animation:none}}
</style>
</head>
<body>
<div id="map"></div>
<header id="plate">
  <div class="eyebrow">AUG 8–16 · 2026 · MEXICO CITY</div>

<div id="ctrls">

</div>
<nav id="rail" aria-label="Days"></nav>
<aside id="card" aria-live="polite"></aside>

<script src="data.js"></script>
<script>

/* ================= itinerary content ================= */
const DAYS=[

 blurb:'The world’s biggest pyramid by volume, a church on its crown, Popocatépetl behind — then the noon bus lands you in ULIV’s 3–4 pm window.',

 tags:[['ok','ULIV stay 2'],['todo','ADO 12:00p — the linchpin']]},
{id:'d7',n:7,date:'Fri · Aug 14',chip:'Chapultepec',hex:'#43dfa6',
 title:'Castle, Sun Stone, Polanco',
 blurb:'Castillo at the 9 am open, then give Antropología the middle of the day — Mexica, Maya, Oaxaca halls only. Don’t conquer the building.',
 stops:[
  {t:'9:00a',r:'castillo',d:'The only royal castle in the Americas; Reforma views.'},
  {t:'11:00a',r:'antro',d:'Sun Stone + Pakal’s tomb. 2.5 hrs, ground floor first.'},
  {t:'1:45p',r:'turix',d:'A 12-ft counter that does only cochinita pibil. Cash.'},

{id:'d8',n:8,date:'Sat · Aug 15',chip:'Roma crawl',hex:'#ff7d92',

 stops:[
  {t:'9:30a',r:'rosetta',d:'Or Lalo! — slow coffee near home.'},

 tags:[['ok','Sartoria 7:30p'],['todo','Contramar: book ~Jul 16']]},
{id:'d9',n:9,date:'Sun · Aug 16',chip:'Depart',hex:'#b48cff',

 stops:[
  {t:'5:00a',r:'uliv',d:'Uber at dawn, ~35 min east.'},
  {t:'8:40a',r:'mex',d:'AM402 → JFK 4:02 pm. Fin.'}],
 tags:[['ok','Flight AM402']]},
];
const PUEBLA=new Set(['capu','casareyna','sacristia','palafox','rosario','zocalop','mural','cholula']);

/* ================= map ================= */
const rmq=matchMedia('(prefers-reduced-motion: reduce)').matches;
const STYLES={dark:'https://tiles.openfreemap.org/styles/dark',
              light:'https://tiles.openfreemap.org/styles/positron'};
let theme;
try{theme=localStorage.getItem('cdmx-theme')}catch(e){}
if(theme!=='dark'&&theme!=='light')
  theme=matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
document.body.classList.toggle('light',theme==='light');
const map=new maplibregl.Map({
  container:'map', style:STYLES[theme],
  center:[-99.163,19.41], zoom:12.4, pitch:58, bearing:-15,
  maxPitch:72, antialias:true, attributionControl:{compact:true}
});
map.addControl(new maplibregl.NavigationControl({visualizePitch:true}),'bottom-left');
map.dragPan.enable(); map.dragRotate.enable(); map.keyboard.enable();
map.touchZoomRotate.enableRotation(); map.touchPitch.enable();
map.getCanvas().style.cursor='';

/* ---- 2D / 3D mode ---- */
let mode='3d';
const basePitch=()=>mode==='3d'?58:0, baseBearing=()=>mode==='3d'?-15:0;
function setMode(m){
  if(mode===m)return;
  mode=m;
  document.getElementById('m2d').classList.toggle('on',m==='2d');
  document.getElementById('m3d').classList.toggle('on',m==='3d');
  if(map.getLayer('glass-buildings'))
    map.setLayoutProperty('glass-buildings','visibility',m==='3d'?'visible':'none');
  map.easeTo({pitch:basePitch(),bearing:baseBearing(),duration:rmq?0:900});
}
document.getElementById('m2d').addEventListener('click',()=>setMode('2d'));
document.getElementById('m3d').addEventListener('click',()=>setMode('3d'));

/* ---- dark / light theme ---- */
function paintThemeChips(){
  document.getElementById('tDark').classList.toggle('on',theme==='dark');
  document.getElementById('tLight').classList.toggle('on',theme==='light');
}
function setTheme(t){
  if(theme===t)return;
  theme=t;
  try{localStorage.setItem('cdmx-theme',t)}catch(e){}
  document.body.classList.toggle('light',t==='light');
  paintThemeChips();
  map.setStyle(STYLES[t]);
}
document.getElementById('tDark').addEventListener('click',()=>setTheme('dark'));
document.getElementById('tLight').addEventListener('click',()=>setTheme('light'));
paintThemeChips();

function bboxOf(coordsList){
  const b=new maplibregl.LngLatBounds();
  coordsList.forEach(c=>b.extend(c)); return b;
}
const cdmxBounds=bboxOf(Object.entries(STOPS).filter(([k])=>!PUEBLA.has(k)).map(([,s])=>s.c));
// zoom-scaled line width: w0 px at z11 growing to w1 px at z16
const lw=(w0,w1)=>['interpolate',['exponential',1.4],['zoom'],11,w0,16,w1];
const PAD={top:90,left:80,right:360,bottom:110};
const PADM={top:70,left:30,right:30,bottom:250};
const pad=()=>innerWidth<840?PADM:PAD;

function addCustomLayers(){
  if(map.getLayer('glass-buildings'))return;
  const style=map.getStyle();
  const srcName=Object.keys(style.sources).find(s=>style.sources[s].type==='vector');
  const firstSymbol=style.layers.find(l=>l.type==='symbol')?.id;
  // hide flat building fills; add glass extrusions
  style.layers.forEach(l=>{
    if(l.type==='fill'&&/building/.test(l.id)) map.setLayoutProperty(l.id,'visibility','none');
  });
  // quiet cartography: street names & shields only when zoomed in close,
  // POI labels closer still, house numbers never — keep place names as-is
  style.layers.forEach(l=>{
    if(l.type!=='symbol')return;
    const sl=l['source-layer'];
    if(sl==='transportation_name') map.setLayerZoomRange(l.id,Math.max(l.minzoom||0,14),24);
    else if(sl==='poi') map.setLayerZoomRange(l.id,Math.max(l.minzoom||0,15),24);
    else if(sl==='housenumber') map.setLayoutProperty(l.id,'visibility','none');
  });
  map.addLayer({
    id:'glass-buildings',type:'fill-extrusion',source:srcName,'source-layer':'building',minzoom:13,
    paint:{
      'fill-extrusion-color':theme==='light'?'#b7c6d8':'#2b4468',
      'fill-extrusion-opacity':theme==='light'?0.55:0.44,
      'fill-extrusion-height':['coalesce',['get','render_height'],11],
      'fill-extrusion-base':['coalesce',['get','render_min_height'],0],
      'fill-extrusion-vertical-gradient':true
    }},firstSymbol);
  // day routes — widths scale with zoom so lines stay bright up close
  DAYS.forEach(day=>{
    map.addSource(day.id,{type:'geojson',data:ROUTES[day.id]});
    map.addLayer({id:day.id+'-glow',type:'line',source:day.id,
      layout:{'line-cap':'round','line-join':'round'},
      paint:{'line-color':day.hex,'line-width':lw(9,22),'line-opacity':.14,'line-blur':2}},firstSymbol);
    map.addLayer({id:day.id+'-ride',type:'line',source:day.id,
      filter:['!=',['get','mode'],'walk'],
      layout:{'line-cap':'round','line-join':'round'},
      paint:{'line-color':day.hex,'line-width':lw(3,8),'line-opacity':.9}},firstSymbol);
    map.addLayer({id:day.id+'-walk',type:'line',source:day.id,
      filter:['==',['get','mode'],'walk'],
      layout:{'line-cap':'round','line-join':'round'},
      paint:{'line-color':day.hex,'line-width':lw(3.5,9),'line-opacity':.95,'line-dasharray':[0,2]}},firstSymbol);
  });
  map.setLayoutProperty('glass-buildings','visibility',mode==='3d'?'visible':'none');
}
// re-add custom layers whenever a style swap wipes them; styledata re-fires
// during our own mutations, so a re-entrancy flag prevents recursion
let addingLayers=false;
function ensureLayers(){
  if(addingLayers||!map.isStyleLoaded()||map.getLayer('glass-buildings'))return;
  addingLayers=true;
  try{addCustomLayers();render()}catch(e){}finally{addingLayers=false}
}
map.on('styledata',ensureLayers);
map.on('load',()=>{
  ensureLayers();
  // layer-scoped events survive setStyle, so wire them once
  DAYS.forEach(day=>['-glow','-ride','-walk'].forEach(sfx=>{
    map.on('mouseenter',day.id+sfx,()=>{map.getCanvas().style.cursor='pointer';setHover(day.id,null)});
    map.on('mouseleave',day.id+sfx,()=>{map.getCanvas().style.cursor='';setHover(null,null)});
    map.on('click',day.id+sfx,e=>{e.preventDefault?.();select(day.id)});
  }));
  map.fitBounds(cdmxBounds,{padding:pad(),pitch:basePitch(),bearing:baseBearing(),duration:rmq?0:2200});
});
// some embedded webviews report a stale container size at init and never
// notify the ResizeObserver — nudge for the first few seconds, refitting
// the overview as long as the user hasn't taken over
let userMoved=false;
['pointerdown','wheel','touchstart'].forEach(ev=>map.getCanvas().addEventListener(ev,()=>{userMoved=true},{passive:true}));
addEventListener('resize',()=>map.resize());
{let n=0,w=0,h=0;
 const iv=setInterval(()=>{
   const c=map.getCanvas();
   map.resize();
   if((c.clientWidth!==w||c.clientHeight!==h)){
     w=c.clientWidth;h=c.clientHeight;
     if(!userMoved&&!state.sel&&map.loaded())
       map.fitBounds(cdmxBounds,{padding:pad(),pitch:basePitch(),bearing:baseBearing(),duration:0});
   }
   if(++n>=12)clearInterval(iv)},400);}

/* ================= markers ================= */
const owner={};
DAYS.forEach(d=>d.stops.forEach(s=>{(owner[s.r]=owner[s.r]||[]).push(d.id)}));
const markers=[];
Object.keys(owner).forEach(ref=>{
  const s=STOPS[ref],days=owner[ref],home=ref==='uliv';
  const day=DAYS.find(d=>d.id===days[0]);
  const el=document.createElement('div');
  el.className='pin'+(home?' home':'');
  el.style.setProperty('--c',home?'#fff':day.hex);
  el.title=s.label;
  el.addEventListener('pointerenter',()=>{
    const use=(state.sel&&days.includes(state.sel))?state.sel:
              (state.hover&&days.includes(state.hover))?state.hover:days[0];
    setHover(use,ref)});
  el.addEventListener('pointerleave',()=>setHover(null,null));
  el.addEventListener('click',e=>{e.stopPropagation();select(days[0])});
  new maplibregl.Marker({element:el}).setLngLat(s.c).addTo(map);
  markers.push({el,ref,days});
});

/* ================= card ================= */
const card=document.getElementById('card');
const tagHtml=t=>`<span class="tag ${t[0]==='ok'?'':'todo'}">${t[0]==='ok'?'✓ ':'⚠ '}${t[1]}</span>`;
function photoHtml(day){
  const p=PHOTOS[day.id]||{};
  return p.src?`<div class="ph"><img src="${p.src}" alt="" loading="lazy">
    <span class="credit">${p.credit}</span></div>`
   :`<div class="ph"></div>`;
}
function showDay(day,ref){
  card.style.setProperty('--c',day.hex);
  card.innerHTML=`${photoHtml(day)}
   <div class="bd">
     <div class="kick"><i></i>Day ${day.n} · ${day.date}</div>
     <h3>${day.title}</h3>
     <p class="blurb">${day.blurb}</p>
     <ul>${day.stops.map(s=>`
       <li class="${s.r===ref?'sel':''}"><span class="tm">${s.t}</span>
        <span class="nm"><b>${STOPS[s.r].label}</b>${s.r===ref?`<span class="why">${s.d}</span>`:''}</span></li>`).join('')}
     </ul>
     <div class="tags">${day.tags.map(tagHtml).join('')}</div>
   </div>`;
}
function showIntro(){
  card.style.setProperty('--c','#8fc5ff');
  card.innerHTML=`
   <div class="bd">
     <div class="kick"><i></i>Trip atlas</div>
     <h3>Nine days, five barrios, one bus east</h3>
     <p class="blurb">Home base is ULIV Condesa (the oversized home pin). Every line follows the real streets —
     dotted means walking, solid means a ride or the ADO bus east to Puebla &amp; Cholula.</p>
     <ul>
       <li><span class="tm">9</span><span class="nm"><b>days</b> · Aug 8–16</span></li>
       <li><span class="tm">33</span><span class="nm"><b>stops</b> · CDMX + Puebla + Cholula</span></li>
       <li><span class="tm">5</span><span class="nm"><b>tables booked</b> · 3 still to chase</span></li>
     </ul>
     <div class="tags"><span class="tag">✓ Casa Azul 11:00a Tue</span><span class="tag todo">⚠ Contramar opens ~Jul 16</span></div>
   </div>`;
}

/* ================= chips + state ================= */
const rail=document.getElementById('rail');
const chips={};
const allChip=document.createElement('button');
allChip.className='chip on';allChip.innerHTML=`<span class="dot"></span><span>Todos<small>full trip</small></span>`;
allChip.addEventListener('click',()=>{state.sel=null;render();flyHome()});
rail.appendChild(allChip);
DAYS.forEach(day=>{
  const c=document.createElement('button');c.className='chip';c.style.setProperty('--c',day.hex);
  c.innerHTML=`<span class="dot"></span><span>Day ${day.n}<small>${day.date.split(' · ')[0]} · ${day.chip}</small></span>`;
  c.addEventListener('pointerenter',()=>setHover(day.id,null));
  c.addEventListener('pointerleave',()=>setHover(null,null));
  c.addEventListener('click',()=>select(day.id));
  rail.appendChild(c);chips[day.id]=c;
});
const state={sel:null,hover:null,ref:null};
function flyHome(){map.fitBounds(cdmxBounds,{padding:pad(),pitch:basePitch(),bearing:baseBearing(),duration:rmq?0:1600})}
function flyDay(day){
  const b=new maplibregl.LngLatBounds();
  ROUTES[day.id].features.forEach(f=>f.geometry.coordinates.forEach(c=>b.extend(c)));
  const p=mode==='3d'?((day.id==='d5'||day.id==='d6')?35:55):0;
  map.fitBounds(b,{padding:pad(),pitch:p,duration:rmq?0:1600});
}
function select(id){
  if(state.sel===id){state.sel=null;render();flyHome();return}
  state.sel=id;render();flyDay(DAYS.find(d=>d.id===id));
}
function setHover(id,ref){state.hover=id;state.ref=ref;render()}
function render(){
  const act=state.hover||state.sel;
  if(map.getLayer('d1-glow')) DAYS.forEach(day=>{
    const on=act===day.id, dimmed=act&&!on;
    map.setPaintProperty(day.id+'-glow','line-opacity',on?.28:dimmed?.03:.14);
    map.setPaintProperty(day.id+'-ride','line-opacity',on?1:dimmed?.07:.9);
    map.setPaintProperty(day.id+'-walk','line-opacity',on?1:dimmed?.07:.95);
    map.setPaintProperty(day.id+'-ride','line-width',on?lw(4.5,11):lw(3,8));
    map.setPaintProperty(day.id+'-walk','line-width',on?lw(5,12):lw(3.5,9));
  });
  DAYS.forEach(day=>chips[day.id].classList.toggle('on',act===day.id||state.sel===day.id));
  allChip.classList.toggle('on',!state.sel&&!act);
  markers.forEach(m=>{
    const mine=act&&m.days.includes(act);
    m.el.classList.toggle('dim',!!act&&!mine&&m.ref!=='uliv');
    m.el.classList.toggle('hot',!!mine&&state.ref===m.ref);
  });
  if(act)showDay(DAYS.find(d=>d.id===act),state.ref);else showIntro();
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){state.sel=null;state.hover=null;render();flyHome()}});
render();
</script>
