<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>CDMX · Aug 8–16</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@125,500;125,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root{
    --bg:#0a0f1e; --ink:#e9edf6; --mut:#93a0b8; --faint:#5f6a85;
    --panel:rgba(12,19,36,.86); --line:rgba(150,200,255,.16);
    --disp:"Archivo",-apple-system,sans-serif;
    --body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body,#map{height:100%;overflow:hidden;background:var(--bg)}
  body{color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
  #map{position:fixed;inset:0}
  /* ---- title plate ---- */
  #plate{position:fixed;left:22px;top:20px;z-index:5;pointer-events:none;
    padding:14px 18px 15px;border-radius:14px;background:var(--panel);
    border:1px solid var(--line);backdrop-filter:blur(14px)}
  #plate .eyebrow{font:500 10px/1 var(--mono);letter-spacing:.24em;color:var(--mut)}
  #plate h1{font:600 30px/1 var(--disp);letter-spacing:.06em;margin:7px 0 5px}
  #plate h1 b{font-weight:500;color:transparent;-webkit-text-stroke:1px rgba(160,215,255,.8)}
  #plate .sub{font:400 11.5px/1.5 var(--body);color:var(--mut);max-width:250px}
  /* ---- chips ---- */
  #rail{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:6;
    display:flex;gap:5px;padding:7px 8px;border-radius:14px;background:var(--panel);
    border:1px solid var(--line);backdrop-filter:blur(14px);
    max-width:calc(100vw - 24px);overflow-x:auto;scrollbar-width:none;
    transition:transform .35s ease,opacity .3s ease}
  #rail::-webkit-scrollbar{display:none}
  #railHide{position:sticky;right:0;flex:none;order:99;align-self:stretch;
    padding:0 8px 0 9px;margin-left:1px;border:0;border-left:1px solid var(--line);
    background:var(--panel);color:var(--faint);cursor:pointer;
    font:600 15px/1 var(--body);transition:color .15s}
  #railHide:hover{color:var(--ink)}
  #railHide:focus-visible{outline:1.5px solid #55d6f0;outline-offset:-2px}
  #railShow{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:6;
    display:none;align-items:center;gap:7px;padding:9px 15px;border-radius:12px;
    background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(14px);
    color:var(--mut);cursor:pointer;font:600 10.5px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase}
  #railShow:hover{color:var(--ink)}
  #railShow:focus-visible{outline:1.5px solid #55d6f0;outline-offset:2px}
  #railShow .dot{width:7px;height:7px;border-radius:50%;
    background:conic-gradient(#f5b84c,#55d6f0,#9edc5a,#5b8cff,#e77ef2,#f5b84c)}
  body.rail-hidden #rail{transform:translate(-50%,180%);opacity:0;pointer-events:none}
  body.rail-hidden #railShow{display:flex}
  .chip{flex:none;display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:9px;
    border:1px solid transparent;background:transparent;color:var(--mut);cursor:pointer;
    font:500 11px/1.2 var(--body);transition:.15s;white-space:nowrap}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--c,#8fc5ff);box-shadow:0 0 6px var(--c,#8fc5ff)}
  .chip small{display:block;font:500 8.5px/1 var(--mono);letter-spacing:.1em;color:var(--faint);margin-top:3px;text-transform:uppercase}
  .chip:hover{color:var(--ink);background:rgba(150,200,255,.08)}
  .chip.on{color:var(--ink);border-color:var(--c,rgba(150,200,255,.45));background:rgba(150,200,255,.09)}
  .chip:focus-visible{outline:1.5px solid #55d6f0;outline-offset:2px}
  /* ---- card ---- */
  #card{position:fixed;right:20px;top:20px;z-index:5;width:312px;pointer-events:none;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    backdrop-filter:blur(16px);overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.06);
    transition:opacity .22s}
  #card .ph{position:relative;height:150px;background:linear-gradient(160deg,#16223f,#0b1122)}
  #card .ph img{width:100%;height:100%;object-fit:cover;display:block;
    mask-image:linear-gradient(to bottom,#000 62%,rgba(0,0,0,.25));
    -webkit-mask-image:linear-gradient(to bottom,#000 62%,rgba(0,0,0,.25))}
  #card .ph .credit{position:absolute;right:8px;bottom:5px;font:400 8.5px/1 var(--mono);
    color:rgba(233,237,246,.55);text-shadow:0 1px 2px rgba(0,0,0,.8)}
  #card .bd{padding:12px 15px 14px}
  #card .kick{display:flex;align-items:center;gap:8px;font:600 9.5px/1 var(--mono);
    letter-spacing:.2em;text-transform:uppercase;color:var(--mut)}
  #card .kick i{width:9px;height:9px;border-radius:50%;background:var(--c,#8fc5ff);box-shadow:0 0 8px var(--c,#8fc5ff)}
  #card h3{font:600 19px/1.15 var(--disp);letter-spacing:.02em;margin:7px 0 5px;text-wrap:balance}
  #card .blurb{font:400 11.5px/1.55 var(--body);color:var(--mut);margin-bottom:8px}
  #card ul{list-style:none;max-height:214px;overflow:hidden}
  #card li{display:flex;gap:9px;padding:2.5px 0;font:400 11.5px/1.45 var(--body)}
  #card li .tm{flex:none;width:46px;font:500 9.5px/1.7 var(--mono);color:var(--faint);
    font-variant-numeric:tabular-nums;text-align:right}
  #card li.sel{color:#fff}
  #card li.sel .tm{color:var(--c,#8fc5ff)}
  #card li .nm b{font-weight:600}
  #card li .why{display:block;font-size:10.5px;color:var(--mut);margin-top:2px}
  #card li .why.sum{color:var(--ink)}
  #card li .why-lbl{display:inline-block;margin-right:5px;color:var(--c,#8fc5ff);
    font:600 7.5px/1 var(--mono);letter-spacing:.13em;text-transform:uppercase;vertical-align:1px}
  #card .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
  #card .tag{font:500 9px/1 var(--mono);letter-spacing:.04em;padding:4px 7px;border-radius:99px;
    border:1px solid rgba(120,225,170,.35);color:#8ce8b8}
  #card .tag.todo{border-color:rgba(245,190,90,.4);color:#f2ca7e}
  /* ---- markers: circular photo thumbnails, scaled inversely with zoom ---- */
  .pin{width:0;height:0;cursor:pointer}
  .pin .face{position:absolute;left:0;top:0;width:var(--ps,42px);height:var(--ps,42px);
    transform:translate(-50%,-50%) scale(var(--pz,1));transform-origin:center;
    border-radius:50%;background:var(--c) center/cover no-repeat;
    border:2.5px solid var(--c);
    box-shadow:0 0 0 2px rgba(255,255,255,.92),0 3px 9px rgba(0,0,0,.55),0 0 12px var(--c);
    transition:width .14s,height .14s,box-shadow .14s}
  .pin .face::after{content:"";position:absolute;inset:0;border-radius:50%;
    box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.35)}
  .pin.home{--ps:52px}
  .pin.home .face{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.95),0 4px 12px rgba(0,0,0,.55),0 0 16px #cfe4ff}
  .pin.dim{opacity:.28}
  .pin.hot{z-index:9}
  .pin.hot .face{--ps:58px;box-shadow:0 0 0 3px #fff,0 6px 18px rgba(0,0,0,.6),0 0 22px var(--c)}
  .pin.home.hot .face{--ps:64px}
  body.light .pin .face{box-shadow:0 0 0 2px rgba(255,255,255,.95),0 3px 9px rgba(20,35,60,.35),0 0 10px var(--c)}
  body.light .pin.hot .face{box-shadow:0 0 0 3px #fff,0 6px 18px rgba(20,35,60,.4),0 0 20px var(--c)}
  /* ---- stop tooltip (popup at the point on the line) ---- */
  .stoptip{pointer-events:none}
  .stoptip .maplibregl-popup-tip{display:none}
  .stoptip .maplibregl-popup-content{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    backdrop-filter:blur(14px);padding:9px 12px 10px;
    box-shadow:0 14px 34px rgba(0,0,0,.4);font-family:var(--body)}
  .stoptip .tt{display:block;width:230px}
  .stoptip .tt-img{display:block;width:100%;height:104px;margin-bottom:9px;border-radius:8px;
    background:var(--tc) center/cover no-repeat;box-shadow:0 2px 8px rgba(0,0,0,.35)}
  .stoptip .tt b{display:block;margin-bottom:4px;color:var(--ink);
    font:600 14.5px/1.2 var(--disp);letter-spacing:.01em}
  .stoptip .tt-kick{display:flex;align-items:center;gap:6px;margin-bottom:7px;
    font:600 8.5px/1.3 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--mut)}
  .stoptip .tt-kick i{width:8px;height:8px;border-radius:50%;flex:none;
    background:var(--tc);box-shadow:0 0 7px var(--tc)}
  .stoptip .tt-sum{display:block;margin-bottom:8px;font:400 11.5px/1.5 var(--body);color:var(--ink)}
  .stoptip .tt-d{display:block;padding-top:7px;border-top:1px solid var(--line);
    font:400 11px/1.45 var(--body);color:var(--mut)}
  .stoptip .tt-lbl{display:inline-block;margin-right:6px;color:var(--tc);
    font:600 8px/1 var(--mono);letter-spacing:.13em;text-transform:uppercase;
    vertical-align:1px}
  /* ---- 2D/3D + theme toggles ---- */
  #ctrls{position:fixed;left:22px;top:162px;z-index:6;display:flex;gap:8px}
  #modes,#themes{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;
    background:var(--panel);backdrop-filter:blur(14px)}
  #ctrls button{font:600 11px/1 var(--mono);letter-spacing:.08em;color:var(--mut);
    background:transparent;border:0;padding:9px 15px;cursor:pointer;transition:.15s}
  #ctrls button:hover{color:var(--ink)}
  #ctrls button.on{color:#0a0f1e;background:#8fc5ff}
  #ctrls button:focus-visible{outline:1.5px solid #55d6f0;outline-offset:-2px}
  /* ---- light theme ---- */
  body.light{
    --bg:#e8ecf2; --ink:#182238; --mut:#4d5b74; --faint:#8b97ac;
    --panel:rgba(250,252,255,.9); --line:rgba(30,60,110,.15);
  }
  body.light #plate h1 b{-webkit-text-stroke-color:rgba(45,95,175,.75)}
  body.light #card{box-shadow:0 24px 60px rgba(30,50,90,.22), inset 0 1px 0 rgba(255,255,255,.7)}
  body.light #card .tag{color:#1e7a4d;border-color:rgba(30,122,77,.45)}
  body.light #card .tag.todo{color:#9a6b1a;border-color:rgba(154,107,26,.45)}
  body.light .pin.home i{background:#16233f;box-shadow:0 0 12px rgba(22,35,63,.45),0 2px 6px rgba(0,0,0,.25)}
  body.light .pin.home b{border-color:#16233f}
  body.light .maplibregl-ctrl-attrib{background:rgba(255,255,255,.65)!important;color:#4d5b74!important}
  body.light .maplibregl-ctrl-attrib a{color:#2d4a74!important}
  body.light .maplibregl-ctrl-group button .maplibregl-ctrl-icon{filter:none}
  /* ---- misc chrome ---- */
  .maplibregl-ctrl-bottom-left{bottom:14px}
  .maplibregl-ctrl-attrib{background:rgba(10,15,30,.6)!important;color:#93a0b8!important;font-size:10px}
  .maplibregl-ctrl-attrib a{color:#b9c6dd!important}
  .maplibregl-ctrl-group{background:var(--panel)!important;border:1px solid var(--line);border-radius:10px!important;overflow:hidden}
  .maplibregl-ctrl-group button{background:transparent!important}
  .maplibregl-ctrl-group button .maplibregl-ctrl-icon{filter:invert(.85) hue-rotate(180deg)}
  /* ---- angle thumbstick (rotate + tilt) ---- */
  .stick{background:none!important;border:0!important;box-shadow:none!important}
  .stk{position:relative;width:44px;height:44px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(14px);
    box-shadow:0 3px 10px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.06);
    cursor:grab;touch-action:none}
  .stk::before{content:"";position:absolute;inset:5px;border-radius:50%;
    border:1px dashed rgba(150,200,255,.16)}
  .stk.on{cursor:grabbing}
  .stk:focus-visible{outline:1.5px solid #55d6f0;outline-offset:2px}
  .knob{position:relative;width:15px;height:15px;border-radius:50%;
    background:var(--mut);box-shadow:0 1px 4px rgba(0,0,0,.55);
    transition:transform .13s ease, background .13s}
  .stk:hover .knob{background:var(--ink)}
  .stk.on .knob{transition:background .13s;background:#8fc5ff}
  body.light .stk::before{border-color:rgba(30,60,110,.16)}
  body.light .knob{box-shadow:0 1px 4px rgba(20,35,60,.3)}
  @media (max-width:840px){
    #plate{left:12px;top:12px;padding:10px 13px}
    #plate h1{font-size:22px}
    #plate .sub{display:none}
    #ctrls{left:12px;top:84px}
    #ctrls button{padding:8px 11px}
    #card{left:12px;right:12px;width:auto;top:auto;bottom:72px}
    #card .ph{height:92px}
    #card ul{max-height:118px}
    #card .blurb{display:none}
    #rail,#railShow{bottom:10px}
  }
  @media (prefers-reduced-motion:reduce){.pin .face{transition:none}}
</style>
</head>
<body>
<div id="map"></div>
<header id="plate">
  <div class="eyebrow">AUG 8–16 · 2026 · MEXICO CITY</div>
  <h1>CDMX</h1>
  <div class="sub">Hover a day to light its route. Dotted walks, solid rides.</div>
</header>
<div id="ctrls">
  <div id="modes" role="group" aria-label="Map view mode">
    <button id="m2d" type="button">2D</button><button id="m3d" type="button" class="on">3D</button>
  </div>
  <div id="themes" role="group" aria-label="Color theme">
    <button id="tDark" type="button">Dark</button><button id="tLight" type="button">Light</button>
  </div>
</div>
<nav id="rail" aria-label="Days"></nav>
<button id="railShow" type="button" aria-label="Show day selector"><span class="dot"></span>Days</button>
<aside id="card" aria-live="polite"></aside>

<script src="data.js"></script>

{id:'d9',n:9,date:'Sun · Aug 16',chip:'Depart',hex:'#b48cff',

/* ---- angle thumbstick: rotates and tilts like a right-drag ----
   Measured against a real drag: bearing += dx*0.8 and pitch -= dy*0.5, so
   pushing right raises bearing and pushing up raises pitch. Speed is
   proportional to how far the knob is pushed, like an analog stick.
   Double-click recenters; arrow keys step it for keyboard users. */
class AngleStick{
  onAdd(m){
    this._map=m;
    const c=this._c=document.createElement('div');
    c.className='maplibregl-ctrl stick';
    c.innerHTML='<div class="stk" tabindex="0" role="application"'+
      ' aria-label="Rotate and tilt the map. Drag, or use arrow keys."'+
      ' title="Drag to rotate and tilt. Double-click to reset."><span class="knob"></span></div>';
    const pad=c.querySelector('.stk'), knob=c.querySelector('.knob');
    const R=16;                                   // max knob travel, px
    let raf=null, vx=0, vy=0, active=false;
    const setKnob=(x,y)=>{knob.style.transform='translate('+x+'px,'+y+'px)'};
    const loop=()=>{
      if(vx||vy) m.jumpTo({
        bearing:m.getBearing()+vx*0.08,           // push right -> bearing up
        pitch:Math.max(0,Math.min(m.getMaxPitch(),m.getPitch()-vy*0.05))}); // push up -> pitch up
      raf=requestAnimationFrame(loop);
    };
    const move=e=>{
      if(!active)return;
      const r=pad.getBoundingClientRect();
      let x=e.clientX-(r.left+r.width/2), y=e.clientY-(r.top+r.height/2);
      const d=Math.hypot(x,y);
      if(d>R){x=x/d*R; y=y/d*R}
      vx=x; vy=y; setKnob(x,y);
    };
    const end=()=>{
      if(!active)return;
      active=false; vx=vy=0; setKnob(0,0); pad.classList.remove('on');
      if(raf)cancelAnimationFrame(raf); raf=null;
      window.removeEventListener('pointermove',move);
      window.removeEventListener('pointerup',end);
      window.removeEventListener('pointercancel',end);
    };
    // track on window, not via pointer capture, so releasing outside still stops it
    pad.addEventListener('pointerdown',e=>{
      e.preventDefault(); e.stopPropagation();
      active=true; pad.classList.add('on');
      move(e);
      window.addEventListener('pointermove',move);
      window.addEventListener('pointerup',end);
      window.addEventListener('pointercancel',end);
      if(!raf)raf=requestAnimationFrame(loop);
    });
    pad.addEventListener('keydown',e=>{
      const K={ArrowLeft:[-12,0],ArrowRight:[12,0],ArrowUp:[0,6],ArrowDown:[0,-6]}[e.key];
      if(!K)return;
      e.preventDefault(); e.stopPropagation();
      m.jumpTo({bearing:m.getBearing()+K[0],
        pitch:Math.max(0,Math.min(m.getMaxPitch(),m.getPitch()+K[1]))});
    });
    pad.addEventListener('dblclick',e=>{
      e.stopPropagation();
      m.easeTo({pitch:basePitch(),bearing:baseBearing(),duration:rmq?0:500});
    });
    return c;
  }
  onRemove(){this._c.remove();this._map=undefined}
}
map.addControl(new AngleStick(),'bottom-left');

function setTheme(t){

  document.body.classList.toggle('light',t==='light');

function bboxOf(coordsList){

const lw=(w0,w1)=>['interpolate',['exponential',1.4],['zoom'],11,w0,16,w1];

const PADM={top:70,left:30,right:30,bottom:250};

function addCustomLayers(){
  const style=map.getStyle();
  const firstSymbol=style.layers.find(l=>l.type==='symbol')?.id;
  // quiet cartography + hide flat building fills (non-fatal if a layer id moves)
  try{
    style.layers.forEach(l=>{
      if(l.type==='fill'&&/building/.test(l.id)) map.setLayoutProperty(l.id,'visibility','none');
      if(l.type!=='symbol')return;
      const sl=l['source-layer'];
      if(sl==='transportation_name') map.setLayerZoomRange(l.id,Math.max(l.minzoom||0,14),24);
      else if(sl==='poi') map.setLayerZoomRange(l.id,Math.max(l.minzoom||0,15),24);
      else if(sl==='housenumber') map.setLayoutProperty(l.id,'visibility','none');
    });
  }catch(e){console.warn('label pass:',e)}
  // glass extrusions: a failure here must never take the routes down with it
  try{
    const srcName=Object.keys(style.sources).find(s=>style.sources[s].type==='vector');
    if(srcName&&!map.getLayer('glass-buildings')) map.addLayer({
      id:'glass-buildings',type:'fill-extrusion',source:srcName,'source-layer':'building',minzoom:13,
      paint:{
        'fill-extrusion-color':theme==='light'?'#b7c6d8':'#2b4468',
        'fill-extrusion-opacity':theme==='light'?0.55:0.44,
        'fill-extrusion-height':['coalesce',['get','render_height'],11],
        'fill-extrusion-base':['coalesce',['get','render_min_height'],0],
        'fill-extrusion-vertical-gradient':true
      }},firstSymbol);
    if(map.getLayer('glass-buildings'))
      map.setLayoutProperty('glass-buildings','visibility',mode==='3d'?'visible':'none');
  }catch(e){console.warn('buildings:',e)}
  // neighborhood tints: soft per-barrio color, dropped in below the roads
  try{
    const firstRoad=style.layers.find(l=>l['source-layer']==='transportation'||/road|highway|bridge|tunnel/.test(l.id))?.id||firstSymbol;
    if(!map.getSource('hoods')) map.addSource('hoods',{type:'geojson',data:HOODS});
    if(!map.getLayer('hood-fill')) map.addLayer({id:'hood-fill',type:'fill',source:'hoods',
      paint:{'fill-color':['get','color'],'fill-opacity':theme==='light'?0.26:0.13}},firstRoad);
    if(!map.getLayer('hood-line')) map.addLayer({id:'hood-line',type:'line',source:'hoods',
      paint:{'line-color':['get','color'],'line-width':1.3,'line-opacity':theme==='light'?0.6:0.32,
        'line-dasharray':[3,2]}},firstRoad);
  }catch(e){console.warn('hoods:',e)}
  // day routes: casing outline (theme-contrast) under a full-opacity core, plus a
  // colored glow that's stronger in dark mode so lines read solid on the dark map.
  // widths scale with zoom; every add is guarded so re-runs are idempotent
  const casing=theme==='light'?'rgba(255,255,255,.95)':'rgba(4,8,18,.85)';
  const glowOp=theme==='light'?0.16:0.34, glowBlur=theme==='light'?2:2.4;
  DAYS.forEach(day=>{try{
    if(!map.getSource(day.id)) map.addSource(day.id,{type:'geojson',data:ROUTES[day.id]});
    const add=(id,def)=>{if(!map.getLayer(id))map.addLayer(Object.assign(
      {id,type:'line',source:day.id,layout:{'line-cap':'round','line-join':'round'}},def),firstSymbol)};
    add(day.id+'-glow',{paint:{'line-color':day.hex,'line-width':lw(12,30),'line-opacity':glowOp,'line-blur':glowBlur}});
    add(day.id+'-case-ride',{filter:['!=',['get','mode'],'walk'],
      paint:{'line-color':casing,'line-width':lw(8,17),'line-opacity':.92}});
    add(day.id+'-case-walk',{filter:['==',['get','mode'],'walk'],
      paint:{'line-color':casing,'line-width':lw(9,18),'line-opacity':.92,'line-dasharray':[0,1.9]}});
    add(day.id+'-ride',{filter:['!=',['get','mode'],'walk'],
      paint:{'line-color':day.hex,'line-width':lw(4.5,12),'line-opacity':1}});
    add(day.id+'-walk',{filter:['==',['get','mode'],'walk'],
      paint:{'line-color':day.hex,'line-width':lw(5,13),'line-opacity':1,'line-dasharray':[0,1.9]}});
  }catch(e){console.warn('route',day.id,e)}});
}
// Re-add custom layers whenever a style swap wipes them. Do NOT gate on
// map.isStyleLoaded(): after setStyle that flag can stay false indefinitely,
// yet addCustomLayers() succeeds anyway (geojson route layers don't need the
// base style, and the building layer just retries until its source is ready).
// Gating on it was the bug: routes never came back on theme switch.
// "Done" = both routes AND buildings present, so we keep retrying until whole.
let addingLayers=false;
function ensureLayers(){
  if(addingLayers)return;
  if(map.getLayer('d1-glow')&&map.getLayer('glass-buildings'))return;
  addingLayers=true;
  try{addCustomLayers();if(map.getLayer('d1-glow'))render()}
  catch(e){console.warn('ensureLayers:',e)}
  finally{addingLayers=false}
}
// fire on every relevant signal; addCustomLayers is idempotent per layer
map.on('styledata',ensureLayers);
map.on('idle',ensureLayers);
map.on('sourcedata',ensureLayers);
map.on('load',()=>{
  ensureLayers();
  // layer-scoped events survive setStyle, so wire them once
  DAYS.forEach(day=>['-glow','-case-ride','-case-walk','-ride','-walk'].forEach(sfx=>{
    map.on('mouseenter',day.id+sfx,()=>{map.getCanvas().style.cursor='pointer';setHover(day.id,null)});
    map.on('mouseleave',day.id+sfx,()=>{map.getCanvas().style.cursor='';setHover(null,null)});
    map.on('click',day.id+sfx,e=>{e.preventDefault?.();select(day.id)});
  }));
  map.fitBounds(cdmxBounds,{padding:pad(),pitch:basePitch(),bearing:baseBearing(),duration:rmq?0:2200});
});
// some embedded webviews report a stale container size at init and never
// notify the ResizeObserver, so nudge for the first few seconds, refitting
// the overview as long as the user hasn't taken over
let userMoved=false;
['pointerdown','wheel','touchstart'].forEach(ev=>map.getCanvas().addEventListener(ev,()=>{userMoved=true},{passive:true}));
addEventListener('resize',()=>map.resize());
{let n=0,w=0,h=0;
 const iv=setInterval(()=>{
   const c=map.getCanvas();
   map.resize();
   if((c.clientWidth!==w||c.clientHeight!==h)){
     w=c.clientWidth;h=c.clientHeight;
     if(!userMoved&&!state.sel&&map.loaded())
       map.fitBounds(cdmxBounds,{padding:pad(),pitch:basePitch(),bearing:baseBearing(),duration:0});
   }
   if(++n>=12)clearInterval(iv)},400);}

const imgFor=(ref,dayId)=>(STOP_IMG[ref]&&STOP_IMG[ref].src)||(PHOTOS[dayId]&&PHOTOS[dayId].src)||'';
const tip=new maplibregl.Popup({closeButton:false,closeOnClick:false,offset:18,
  className:'stoptip',maxWidth:'250px'});
function showTip(ref,days){
  const day=DAYS.find(d=>d.id===dayFor(days));
  const s=day.stops.find(x=>x.r===ref); if(!s)return;
  const c=ref==='uliv'?'var(--ink)':day.hex;
  const img=imgFor(ref,day.id);
  const imgHtml=img?`<span class="tt-img" style="background-image:url('${img}')"></span>`:'';
  const sum=SUMMARIES[ref]?`<span class="tt-sum">${SUMMARIES[ref]}</span>`:'';
  tip.setLngLat(STOPS[ref].c).setHTML(
    `<div class="tt" style="--tc:${c}">${imgHtml}`+
    `<b>${STOPS[ref].label}</b>`+
    `<span class="tt-kick"><i></i>Day ${day.n} · ${day.date.replace(' · ',' ')} · ${s.t}</span>`+
    `${sum}`+
    `<span class="tt-d"><span class="tt-lbl">Plan</span>${s.d}</span></div>`).addTo(map);
}
Object.keys(owner).forEach(ref=>{
  const s=STOPS[ref],days=owner[ref],home=ref==='uliv';
  const day=DAYS.find(d=>d.id===days[0]);
  const el=document.createElement('div');
  el.className='pin'+(home?' home':'');
  el.style.setProperty('--c',home?'#fff':day.hex);
  el.setAttribute('aria-label',s.label);
  const face=document.createElement('div');face.className='face';
  const img=imgFor(ref,days[0]);
  if(img)face.style.backgroundImage=`url("${img}")`;
  el.appendChild(face);
  el.addEventListener('pointerenter',()=>{setHover(dayFor(days),ref);showTip(ref,days)});
  el.addEventListener('pointerleave',()=>{setHover(null,null);tip.remove()});
  el.addEventListener('click',e=>{e.stopPropagation();select(days[0])});
  new maplibregl.Marker({element:el}).setLngLat(s.c).addTo(map);
  markers.push({el,ref,days});
});

}

const state={sel:null,hover:null,ref:null};
function flyHome(){map.fitBounds(cdmxBounds,{padding:pad(),pitch:basePitch(),bearing:baseBearing(),duration:rmq?0:1600})}
function flyDay(day){
  const b=new maplibregl.LngLatBounds();
  ROUTES[day.id].features.forEach(f=>f.geometry.coordinates.forEach(c=>b.extend(c)));
  const p=mode==='3d'?((day.id==='d5'||day.id==='d6')?35:55):0;
  map.fitBounds(b,{padding:pad(),pitch:p,duration:rmq?0:1600});
}
function select(id){
  if(state.sel===id){state.sel=null;render();flyHome();return}
  state.sel=id;render();flyDay(DAYS.find(d=>d.id===id));
}
function setHover(id,ref){state.hover=id;state.ref=ref;render()}
function render(){
  const act=state.hover||state.sel;
  const gBase=theme==='light'?.16:.34;               // glow opacity matches addCustomLayers
  if(map.getLayer('d1-glow')) DAYS.forEach(day=>{
    const on=act===day.id, dimmed=act&&!on;
    map.setPaintProperty(day.id+'-glow','line-opacity',on?gBase+.16:dimmed?.05:gBase);
    map.setPaintProperty(day.id+'-ride','line-opacity',on?1:dimmed?.08:1);
    map.setPaintProperty(day.id+'-walk','line-opacity',on?1:dimmed?.08:1);
    map.setPaintProperty(day.id+'-case-ride','line-opacity',on?1:dimmed?.06:.92);
    map.setPaintProperty(day.id+'-case-walk','line-opacity',on?1:dimmed?.06:.92);
    map.setPaintProperty(day.id+'-ride','line-width',on?lw(6,14):lw(4.5,12));
    map.setPaintProperty(day.id+'-walk','line-width',on?lw(6.5,15):lw(5,13));
    map.setPaintProperty(day.id+'-case-ride','line-width',on?lw(10,19):lw(8,17));
    map.setPaintProperty(day.id+'-case-walk','line-width',on?lw(11,20):lw(9,18));
  });
  DAYS.forEach(day=>chips[day.id].classList.toggle('on',act===day.id||state.sel===day.id));
  allChip.classList.toggle('on',!state.sel&&!act);
  markers.forEach(m=>{
    const mine=act&&m.days.includes(act);
    m.el.classList.toggle('dim',!!act&&!mine&&m.ref!=='uliv');
    m.el.classList.toggle('hot',!!mine&&state.ref===m.ref);
  });
  if(act)showDay(DAYS.find(d=>d.id===act),state.ref);else showIntro();
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){state.sel=null;state.hover=null;render();flyHome()}});
render();
</script>
</body>
</html>
